<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麥克愛愛｜庫存比對系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{--bg:#f4f6f9;--surface:#fff;--surface2:#f8f9fb;--border:#e2e6ed;--border2:#d0d5de;--text:#1a2035;--text-dim:#6b7592;--accent:#2563eb;--orange:#ea6c00;--red:#dc2626;--green:#16a34a;--blue:#1d4ed8;--yellow:#d97706;--red-bg:#fef2f2;--orange-bg:#fff7ed;--green-bg:#f0fdf4;--blue-bg:#eff6ff;--yellow-bg:#fffbeb;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;font-size:14px}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .logo{font-size:14px;font-weight:700}.logo span{color:var(--accent)}
  .inv-status{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--border2)}.dot.live{background:var(--green)}.dot.err{background:var(--red)}
  .main{max-width:1080px;margin:0 auto;padding:16px 20px 60px}
  .upload-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .upload-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap}
  .upload-slots{display:flex;gap:6px;flex:1;flex-wrap:wrap}
  .upload-slot{position:relative;border:1.5px dashed var(--border2);border-radius:7px;padding:5px 9px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;min-width:118px;background:var(--surface2)}
  .upload-slot:hover{border-color:var(--accent);background:var(--blue-bg)}
  .upload-slot.filled{border-color:var(--green);border-style:solid;background:var(--green-bg)}
  .upload-slot.inv-slot{border-color:var(--accent);border-style:solid;background:var(--blue-bg);min-width:138px}
  .upload-slot.inv-slot.filled{border-color:var(--green);background:var(--green-bg)}
  .slot-icon{font-size:13px;flex-shrink:0}.slot-info{min-width:0}
  .slot-type{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
  .slot-name{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
  .slot-name.ready{color:var(--green);font-weight:600}
  .upload-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
  .divider{width:1px;height:30px;background:var(--border);flex-shrink:0}
  .run-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
  .run-btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);box-shadow:0 3px 8px rgba(37,99,235,.3)}
  .run-btn:disabled{background:var(--border2);color:var(--text-dim);cursor:not-allowed}
  .error-msg{background:var(--red-bg);border:1px solid #fecaca;border-radius:7px;padding:8px 13px;color:var(--red);font-size:12px;margin-bottom:10px;display:none}
  .status-bar{display:none;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 14px;margin-bottom:10px;font-size:12px;color:var(--text-dim);align-items:center;gap:9px}
  .spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:10px}
  .card-icon{font-size:18px}.card-num{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}.card-label{font-size:10px;color:var(--text-dim);margin-top:2px}
  .card.warn{border-color:#fed7aa;background:var(--orange-bg)}.card.warn .card-num{color:var(--orange)}
  .card.info{border-color:#bfdbfe;background:var(--blue-bg)}.card.info .card-num{color:var(--blue)}
  .card.ok{border-color:#bbf7d0;background:var(--green-bg)}.card.ok .card-num{color:var(--green)}
  .result-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
  .result-header{padding:10px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);background:var(--surface2)}
  .result-header:hover{background:#f0f2f7}
  .result-header-left{display:flex;align-items:center;gap:8px}
  .result-tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
  .tag-warn{background:#fed7aa;color:#9a3412}.tag-info{background:#bfdbfe;color:#1e3a8a}.tag-ok{background:#bbf7d0;color:#14532d}
  .result-title{font-size:13px;font-weight:600}.result-count{font-size:11px;color:var(--text-dim)}
  .chevron{color:var(--text-dim);font-size:11px;transition:transform .2s}.chevron.open{transform:rotate(180deg)}
  .result-body{display:none;overflow-x:auto}.result-body.open{display:block}
  table{width:100%;border-collapse:collapse}
  thead tr{background:#f8f9fb}
  th{padding:8px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:8px 13px;border-bottom:1px solid #f0f2f5;vertical-align:middle;font-size:12px}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafbfc}
  .erp-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:#eff6ff;padding:2px 6px;border-radius:4px;border:1px solid #bfdbfe}
  .diff-neg{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red)}
  .diff-pos{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green)}
  .suggest-cell{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;padding:2px 9px;border-radius:4px;display:inline-block}
  .suggest-neg{color:var(--red);background:#fef2f2;border:1px solid #fecaca}
  .suggest-pos{color:var(--green);background:#f0fdf4;border:1px solid #bbf7d0}
  .pending-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--yellow-bg);color:var(--yellow);border:1px solid #fde68a}
  .actions-row{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
  .export-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s}
  .export-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--blue-bg)}
  .ts{font-size:10px;color:var(--text-dim);text-align:right;margin-top:5px;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<header class="header">
  <div class="logo">麥克<span>愛愛</span> 庫存比對</div>
  <div class="inv-status"><div class="dot" id="invDot"></div><span id="invStatusText">等待上傳庫存表</span></div>
</header>
<main class="main">
  <div class="upload-panel">
    <div>
      <div class="upload-label" style="margin-bottom:4px">庫存表</div>
      <label class="upload-slot inv-slot" id="slotInv">
        <div class="slot-icon">📋</div>
        <div class="slot-info"><div class="slot-type">主機庫存</div><div class="slot-name" id="slotInvName">點擊上傳</div></div>
        <input type="file" accept=".xlsx,.xls" onchange="handleInv(event)">
      </label>
    </div>
    <div class="divider"></div>
    <div style="flex:1">
      <div class="upload-label" style="margin-bottom:4px">Shopline 匯出（可一次選多個）</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <label class="upload-slot" id="slotSL" style="min-width:180px;cursor:pointer">
          <div class="slot-icon">📂</div>
          <div class="slot-info">
            <div class="slot-type">點擊選取檔案</div>
            <div class="slot-name" id="slotSLName">尚未選取</div>
          </div>
          <input type="file" accept=".xlsx,.xls" multiple onchange="handleSLMulti(event)">
        </label>
        <div id="slFileList" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="divider"></div>
    <button class="run-btn" id="runBtn" disabled onclick="runComparison()">開始比對</button>
  </div>
  <div id="errorMsg" class="error-msg"></div>
  <div class="status-bar" id="statusBar"><div class="spinner"></div><span id="statusText">處理中…</span></div>
  <div id="results" style="display:none">
    <div class="summary-cards" id="summaryCards"></div>
    <div class="result-section">
      <div class="result-header" onclick="toggle('bodyWarn','chevWarn')">
        <div class="result-header-left"><span class="result-tag tag-warn">⚠️ 需調整</span><span class="result-title">數量有差異，需更新 Shopline</span></div>
        <div style="display:flex;align-items:center;gap:9px"><span class="result-count" id="countWarn"></span><span class="chevron open" id="chevWarn">▼</span></div>
      </div>
      <div class="result-body open" id="bodyWarn">
        <table><thead><tr>
          <th>ERP條碼（款式貨號）</th><th>商品名稱</th><th>款式</th>
          <th style="text-align:center">Shopline目前數量</th><th style="text-align:center">庫存可賣台數</th>
          <th style="text-align:center">差異</th><th style="text-align:center">建議填入增減數量</th><th>差異原因</th>
        </tr></thead><tbody id="tbodyWarn"></tbody></table>
      </div>
    </div>
    <div class="result-section">
      <div class="result-header" onclick="toggle('bodyInfo','chevInfo')">
        <div class="result-header-left"><span class="result-tag tag-info">❓ 待上架</span><span class="result-title">庫存可賣，Shopline 尚未建立</span></div>
        <div style="display:flex;align-items:center;gap:9px"><span class="result-count" id="countInfo"></span><span class="chevron open" id="chevInfo">▼</span></div>
      </div>
      <div class="result-body open" id="bodyInfo">
        <table><thead><tr>
          <th>ERP條碼（款式貨號）</th><th>型號</th><th style="text-align:center">顏色</th><th style="text-align:center">類別</th><th style="text-align:center">整體等級</th><th style="text-align:center">螢幕等級</th><th style="text-align:center">機身等級</th><th style="text-align:center">進階售價</th><th style="text-align:center">可賣台數</th><th style="text-align:center">上架狀態</th>
        </tr></thead><tbody id="tbodyInfo"></tbody></table>
      </div>
    </div>
    <div class="result-section">
      <div class="result-header" onclick="toggle('bodyOk','chevOk')">
        <div class="result-header-left"><span class="result-tag tag-ok">✅ 正確</span><span class="result-title">數量一致，不需調整</span></div>
        <div style="display:flex;align-items:center;gap:9px"><span class="result-count" id="countOk"></span><span class="chevron" id="chevOk">▼</span></div>
      </div>
      <div class="result-body" id="bodyOk">
        <table><thead><tr>
          <th>ERP條碼（款式貨號）</th><th>商品名稱</th><th>款式</th><th style="text-align:center">數量</th>
        </tr></thead><tbody id="tbodyOk"></tbody></table>
      </div>
    </div>
    <div class="actions-row"><button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button></div>
    <div class="ts" id="reportTs"></div>
  </div>
</main>
<script>
let inventoryData=null, shoplineFiles=[], lastResult=null;

function handleInv(e){const f=e.target.files[0];if(f)parseInventory(f);}
function handleSLMulti(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;
  shoplineFiles=files;
  // 更新 UI
  const slot=document.getElementById('slotSL');
  slot.classList.add('filled');
  document.getElementById('slotSLName').textContent=`已選 ${files.length} 個檔案`;
  document.getElementById('slotSLName').classList.add('ready');
  // 顯示檔名標籤
  const list=document.getElementById('slFileList');
  list.innerHTML=files.map(f=>`<span style="font-size:10px;padding:3px 8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;color:#16a34a;white-space:nowrap">${f.name.length>18?f.name.slice(0,16)+'…':f.name}</span>`).join('');
  checkReady();
}

// ── 庫存表解析（完全模仿 Python pandas header=0 邏輯）
async function parseInventory(file){
  const dot=document.getElementById('invDot'), text=document.getElementById('invStatusText');
  dot.className='dot'; text.textContent='讀取庫存中…';
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    // 找「麥克愛愛庫存合併表」工作表
    const wsName = wb.SheetNames.find(n=>n.includes('麥克愛愛庫存合併表')) || wb.SheetNames[0];
    const ws=wb.Sheets[wsName];
    // 用 header:1 模式，SheetJS 以第一行為 key（等同 pandas header=0）
    // 但庫存表真正的欄位名在 row 0，所以用 header:1 讓 SheetJS 自動以 row 0 為欄位
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    // 欄位名直接對應
    const KEY_STATUS = '販售狀態';
    const KEY_ERP    = 'ERP條碼';
    const KEY_MODEL  = '型號';
    const sampleRow  = rows[0] || {};
    const KEY_COLOR  = Object.keys(sampleRow).find(k=>k.includes('顏色')) || '顏色';
    const KEY_PRICE  = Object.keys(sampleRow).find(k=>k.includes('進階售價')) || '進階售價';

    const erpMap={};let avail=0;
    for(const row of rows){
      const status=String(row[KEY_STATUS]||'');
      if(!status.includes('現貨'))continue;
      const erp=String(row[KEY_ERP]||'').trim();
      if(!erp)continue;
      if(!erpMap[erp])erpMap[erp]={
        erp,
        model:  String(row[KEY_MODEL]||'').trim(),
        color:  String(row[KEY_COLOR]||'').trim(),
        cat:    String(row['類別']||'').trim(),
        gradeO: String(row['整體等級']||'').trim(),
        gradeS: String(row['螢幕等級']||'').trim(),
        gradeB: String(row['機身等級']||'').trim(),
        price:  row[KEY_PRICE]||'',
        count:0
      };
      erpMap[erp].count++;avail++;
    }
    // 建立不可賣原因對照表（ERP碼 → 不可賣狀態統計）
    const reasonMap={};
    for(const row of rows){
      const status=String(row[KEY_STATUS]||'');
      if(status.includes('現貨'))continue; // 跳過可賣的
      if(status==='已售出'||status==='')continue; // 不顯示已售出
      const erp=String(row[KEY_ERP]||'').trim();
      if(!erp)continue;
      if(!reasonMap[erp])reasonMap[erp]={};
      reasonMap[erp][status]=(reasonMap[erp][status]||0)+1;
    }
    inventoryData={erpMap,avail,reasonMap};
    document.getElementById('slotInv').classList.add('filled');
    const nm=document.getElementById('slotInvName');
    nm.textContent=file.name.length>16?file.name.slice(0,14)+'…':file.name; nm.classList.add('ready');
    dot.classList.add('live');
    text.textContent=`庫存已載入｜可賣 ${avail} 台 / ${Object.keys(erpMap).length} 個規格`;
    checkReady();
  }catch(err){dot.classList.add('err');text.textContent=`庫存讀取失敗：${err.message}`;}
}

// ── Shopline 解析（完全模仿 Python pandas header=1 + ffill + drop_duplicates）
async function parseShopline(files){
  // 回傳：Map<erp, {name, variant, qty}>，已 drop_duplicates（只取第一筆）
  const slMap={};
  for(const file of files){
    if(!file)continue;
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    // Shopline 有兩行 header（英文+中文），用 header:1 讓 SheetJS 讀原始陣列
    const raw=XLSX.utils.sheet_to_json(ws,{defval:'',header:1});

    // 找中文 header 行（包含「款式貨號」的那行）
    let hi=-1;
    for(let i=0;i<Math.min(raw.length,5);i++){
      if(raw[i].some(v=>String(v).includes('款式貨號'))){hi=i;break;}
    }
    if(hi<0)continue;

    // 建立欄位名→index 的對照表（等同 pandas 的 df.columns）
    const hdrs=raw[hi].map(v=>String(v));
    const colIdx={};
    hdrs.forEach((h,i)=>{ colIdx[h]=i; });

    // 精確找各欄 index（用欄位名稱，不用猜）
    const vi  = colIdx['款式貨號'] ?? -1;                      // 多款式 ERP
    const ski = colIdx['商品貨號'] ?? -1;                      // 單款式 ERP
    const qi  = colIdx['款式數量 (參考用，請勿修改)'] ?? -1;    // 款式數量
    const pqi = colIdx['數量 (參考用，請勿修改)'] ?? -1;        // 商品數量（單款式用）
    const ni  = colIdx['商品名稱 (繁體中文)'] ?? -1;
    const ti  = colIdx['款式 (繁體中文) (勿更改)'] ?? -1;
    if((vi<0&&ski<0)||(qi<0&&pqi<0))continue;

    // 從 hi+1 開始遍歷資料行，做 ffill + drop_duplicates
    let lastName='';
    for(let i=hi+1;i<raw.length;i++){
      const row=raw[i];
      // ffill 商品名稱
      const nameVal=ni>=0?String(row[ni]||'').trim():'';
      if(nameVal&&nameVal!=='undefined'&&nameVal!=='nan')lastName=nameVal;

      // 優先用款式貨號，沒有才用商品貨號（單款式商品）
      let vsku=vi>=0?String(row[vi]||'').trim().replace(/^-+|-+$/g,''):'';
      let useQtyCol=qi;
      if(!vsku||vsku==='undefined'||vsku==='nan'){
        vsku=ski>=0?String(row[ski]||'').trim().replace(/^-+|-+$/g,''):'';
        useQtyCol=pqi;
      }
      if(!vsku||vsku==='undefined'||vsku==='nan')continue;
      // drop_duplicates：已有的跳過（取第一筆）
      if(slMap[vsku])continue;
      // 數量：精確讀取，轉數字
      const rawQty=useQtyCol>=0?row[useQtyCol]:'';
      const qty=(rawQty===''||rawQty===null||rawQty===undefined)?0:(isNaN(parseFloat(rawQty))?0:parseFloat(rawQty));
      slMap[vsku]={
        name:lastName,
        variant:ti>=0?String(row[ti]||'').trim():'',
        qty:Math.round(qty)
      };
    }
  }
  return slMap;
}

// ── 主比對邏輯
async function runComparison(){
  hideError();showStatus('解析 Shopline 檔案…');
  try{
    const slMap=await parseShopline(shoplineFiles);
    showStatus('比對中…');
    const{erpMap}=inventoryData;
    const availErp=new Set(Object.keys(erpMap));

    const needFix=[],correct=[];
    // 只比對 Shopline 中有且庫存也有的 ERP
    for(const[erp,sl]of Object.entries(slMap)){
      if(!availErp.has(erp))continue;
      const invQ=erpMap[erp].count, diff=invQ-sl.qty;
      // 差異原因：列出不可賣的狀態分布
      const reasons=inventoryData.reasonMap[erp]||{};
      const reasonStr=Object.entries(reasons).map(([s,n])=>s+' x'+n).join('、');
      const entry={erp, name:sl.name, variant:sl.variant, slQ:sl.qty, invQ, diff,
                   model:erpMap[erp].model, color:erpMap[erp].color, reason:reasonStr};
      diff!==0?needFix.push(entry):correct.push(entry);
    }
    needFix.sort((a,b)=>a.diff-b.diff);

    const matched=new Set([...needFix,...correct].map(r=>r.erp));
    const notFound=Object.values(erpMap)
      .filter(e=>!matched.has(e.erp))
      .sort((a,b)=>a.model.localeCompare(b.model));

    lastResult={needFix,notFound,correct};
    render(needFix,notFound,correct);
  }catch(err){showError(`比對失敗：${err.message}`);}
  finally{hideStatus();}
}

function render(needFix,notFound,correct){
  document.getElementById('results').style.display='block';
  document.getElementById('summaryCards').innerHTML=`
    <div class="card warn"><div class="card-icon">⚠️</div><div><div class="card-num">${needFix.length}</div><div class="card-label">需調整數量</div></div></div>
    <div class="card info"><div class="card-icon">❓</div><div><div class="card-num">${notFound.length}</div><div class="card-label">待上架規格</div></div></div>
    <div class="card ok"><div class="card-icon">✅</div><div><div class="card-num">${correct.length}</div><div class="card-label">數量正確</div></div></div>`;
  document.getElementById('countWarn').textContent=`${needFix.length} 筆`;
  document.getElementById('countInfo').textContent=`${notFound.length} 個規格`;
  document.getElementById('countOk').textContent=`${correct.length} 筆`;

  document.getElementById('tbodyWarn').innerHTML=needFix.length===0
    ?`<tr><td colspan="7" style="text-align:center;padding:18px;color:var(--text-dim)">✅ 無需調整項目</td></tr>`
    :needFix.map(r=>{
      const d=r.diff>0?`+${r.diff}`:String(r.diff);
      const dc=r.diff<0?'diff-neg':'diff-pos', sc=r.diff<0?'suggest-neg':'suggest-pos';
      return `<tr><td><span class="erp-code">${esc(r.erp)}</span></td><td style="max-width:180px">${esc(r.name)}</td><td style="color:var(--text-dim);max-width:160px">${esc(r.variant)}</td><td style="text-align:center">${r.slQ}</td><td style="text-align:center;font-weight:600">${r.invQ}</td><td style="text-align:center"><span class="${dc}">${d}</span></td><td style="text-align:center"><span class="suggest-cell ${sc}">${d}</span></td><td style="font-size:11px;color:var(--text-dim);max-width:160px">${esc(r.reason||'')}</td></tr>`;
    }).join('');

  document.getElementById('tbodyInfo').innerHTML=notFound.length===0
    ?`<tr><td colspan="5" style="text-align:center;padding:18px;color:var(--text-dim)">所有規格已上架</td></tr>`
    :notFound.map(r=>`<tr>
      <td><span class="erp-code">${esc(r.erp)}</span></td>
      <td>${esc(r.model)}</td>
      <td style="text-align:center">${esc(r.color)}</td>
      <td style="text-align:center">${esc(r.cat)}</td>
      <td style="text-align:center;font-weight:600">${esc(r.gradeO)}</td>
      <td style="text-align:center">${esc(r.gradeS)}</td>
      <td style="text-align:center">${esc(r.gradeB)}</td>
      <td style="text-align:center">${r.price!==''?'$'+Number(r.price).toLocaleString():''}</td>
      <td style="text-align:center;font-weight:700">${r.count}</td>
      <td style="text-align:center"><span class="pending-badge">待上架</span></td>
    </tr>`).join('');

  document.getElementById('tbodyOk').innerHTML=correct.length===0
    ?`<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--text-dim)">—</td></tr>`
    :correct.map(r=>`<tr><td><span class="erp-code">${esc(r.erp)}</span></td><td style="max-width:180px">${esc(r.name)}</td><td style="color:var(--text-dim);max-width:160px">${esc(r.variant)}</td><td style="text-align:center">${r.slQ}</td></tr>`).join('');

  const now=new Date();
  document.getElementById('reportTs').textContent=`比對時間：${now.toLocaleDateString('zh-TW')} ${now.toLocaleTimeString('zh-TW')}`;
  window.scrollTo({top:document.getElementById('results').offsetTop-16,behavior:'smooth'});
}

function checkReady(){
  const ok=!!inventoryData&&shoplineFiles.some(f=>f!==null);
  const btn=document.getElementById('runBtn');
  btn.disabled=!ok;
  btn.textContent=!inventoryData?'請先上傳庫存表':!shoplineFiles.some(f=>f)?'請上傳 Shopline 檔案':'開始比對';
}
function toggle(b,c){document.getElementById(b).classList.toggle('open');document.getElementById(c).classList.toggle('open');}
function showStatus(m){const b=document.getElementById('statusBar');b.style.display='flex';document.getElementById('statusText').textContent=m;document.getElementById('runBtn').disabled=true;}
function hideStatus(){document.getElementById('statusBar').style.display='none';checkReady();}
function showError(m){const el=document.getElementById('errorMsg');el.textContent=m;el.style.display='block';}
function hideError(){document.getElementById('errorMsg').style.display='none';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function exportCSV(){
  if(!lastResult)return;
  const{needFix,notFound}=lastResult;
  let csv='區塊,ERP條碼,型號/商品名稱,款式,Shopline數量,庫存可賣,差異,建議增減\n';
  for(const r of needFix){const d=r.diff>0?`+${r.diff}`:String(r.diff);csv+=`需調整,"${r.erp}","${r.name||r.model}","${r.variant}",${r.slQ},${r.invQ},${d},${d}\n`;}
  for(const r of notFound){csv+=`待上架,"${r.erp}","${r.model}","${r.color}",,${r.count},,\n`;}
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`麥克愛愛_比對_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
</script>
</body>
</html>
