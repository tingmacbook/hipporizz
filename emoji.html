<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>符號 & Emoji 工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--sur:#fff;--sur2:#f0ede7;--bd:#e0dcd5;--tx:#1a1814;--tx2:#6b6760;--tx3:#a09d98;--ac:#d4460a;--acl:#fdf0eb;--gr:#1a7a4a;--grl:#eaf5ef;--r:8px;--rsm:6px;--apple:#1d1d1f;--applel:#f5f5f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--tx);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.hdr h1{font-size:13px;font-weight:700;color:#fff;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.hdr-hint{font-size:11px;color:#888;white-space:nowrap}
.hdr-search{position:relative;width:260px;flex-shrink:0}
.hdr-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:#777;pointer-events:none}
.hdr-search input{width:100%;height:32px;padding:0 10px 0 30px;border:1px solid #3a3a3a;border-radius:var(--rsm);background:#252525;color:#eee;font-size:12px;font-family:inherit;outline:none;transition:border .15s}
.hdr-search input:focus{border-color:var(--ac)}
.hdr-search input::placeholder{color:#555}
.layout{display:grid;grid-template-columns:190px 1fr;flex:1;min-height:0}
.sb{background:var(--sur);border-right:1px solid var(--bd);overflow-y:auto;height:calc(100vh - 46px);position:sticky;top:0}
.sb-sec{padding:10px 0 2px}
.sb-ttl{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:.13em;text-transform:uppercase;padding:0 13px 5px}
.sb-hr{border:none;border-top:1px solid var(--bd);margin:3px 0}
.nav{display:flex;align-items:center;gap:7px;padding:7px 13px;font-size:12.5px;cursor:pointer;color:var(--tx2);border-left:2px solid transparent;transition:all .1s;user-select:none;line-height:1.2}
.nav:hover{background:var(--bg);color:var(--tx)}
.nav.on{background:var(--acl);color:var(--ac);border-left-color:var(--ac);font-weight:500}
.nav[data-tab="sym_Apple符號"]{font-weight:500}
.nav[data-tab="sym_Apple符號"].on{background:var(--applel);color:var(--apple);border-left-color:var(--apple)}
.nav-ic{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.nav-ct{margin-left:auto;font-size:9.5px;background:var(--sur2);color:var(--tx3);padding:1px 5px;border-radius:20px;flex-shrink:0}
.nav.on .nav-ct{background:#ffe0d4;color:var(--ac)}
.main{padding:16px 18px;overflow-y:auto;height:calc(100vh - 46px)}
.pg-ttl{font-size:15px;font-weight:700;margin-bottom:2px}
.pg-desc{font-size:11px;color:var(--tx3);margin-bottom:12px}
/* Symbol grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:4px}
.cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sur);border:1px solid var(--bd);border-radius:var(--rsm);cursor:pointer;transition:all .1s;position:relative;user-select:none;overflow:hidden}
.cell:hover{border-color:var(--ac);background:var(--acl);transform:scale(1.07);z-index:2}
.cell.flash{border-color:var(--gr);background:var(--grl)}
.cell-s{font-size:19px;line-height:1;text-align:center;pointer-events:none}
.cell-n{font-size:8.5px;color:var(--tx3);margin-top:1px;max-width:42px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;pointer-events:none}
/* Kaomoji grid */
.kao-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px}
.kao-cell{min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sur);border:1px solid var(--bd);border-radius:var(--rsm);cursor:pointer;transition:all .1s;position:relative;user-select:none;padding:6px 8px;gap:3px}
.kao-cell:hover{border-color:var(--ac);background:var(--acl);transform:scale(1.02);z-index:2}
.kao-cell.flash{border-color:var(--gr);background:var(--grl)}
.kao-s{font-size:13px;line-height:1.4;text-align:center;word-break:keep-all;color:var(--tx);pointer-events:none}
.kao-n{font-size:9px;color:var(--tx3);text-align:center;pointer-events:none}
.del-btn{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:#e53935;color:#fff;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;z-index:3;line-height:1}
.cell:hover .del-btn,.kao-cell:hover .del-btn{display:flex}
.sg{margin-bottom:16px}
.sg-ttl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.fav-add{background:var(--sur);border:1px dashed var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.fav-add-ttl{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:7px}
.fav-row{display:flex;gap:6px}
.fav-inp{height:32px;padding:0 9px;border:1px solid var(--bd);border-radius:var(--rsm);background:var(--bg);font-size:14px;color:var(--tx);font-family:inherit;outline:none;transition:border .15s;flex:2;min-width:0}
.fav-inp.nm{flex:1;font-size:12px}
.fav-inp:focus{border-color:var(--ac)}
.btn-add{height:32px;padding:0 12px;background:var(--ac);color:#fff;border:none;border-radius:var(--rsm);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.btn-add:hover{opacity:.85}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--tx);color:#fff;padding:7px 16px;border-radius:30px;font-size:12px;opacity:0;transition:all .18s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 0;color:var(--tx3);font-size:13px}
.empty-ic{font-size:28px;margin-bottom:6px}
@media(max-width:640px){
  .layout{grid-template-columns:1fr}
  .sb{display:flex;overflow-x:auto;overflow-y:hidden;position:static;height:auto;border-right:none;border-bottom:1px solid var(--bd)}
  .sb-sec{display:contents}.sb-ttl,.sb-hr{display:none}
  .nav{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:6px 10px;flex-shrink:0}
  .nav.on{border-bottom-color:var(--ac);border-left:none}
  .main{height:auto}
  .hdr-search{display:none}
}
</style>
</head>

let favs = JSON.parse(localStorage.getItem('sym_v5') || '[]');
let tab = 'sym_Apple符號';
let q = '';

function save() {
  localStorage.setItem('sym_v5', JSON.stringify(favs));
  document.getElementById('fav-count').textContent = favs.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1300);
}

function copyByIdx(idx) {
  const item = POOL[idx];
  if (!item) return;
  const sym = item.s;
  const el = document.querySelector('[data-idx="' + idx + '"]');
  navigator.clipboard.writeText(sym).then(() => {
    if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 600); }
    showToast('已複製：' + sym);
  }).catch(() => {
    const a = document.createElement('textarea');
    a.value = sym; document.body.appendChild(a); a.select();
    document.execCommand('copy'); document.body.removeChild(a);
    showToast('已複製：' + sym);
  });
}

function addFavByIdx(idx) {
  const item = POOL[idx];
  if (!item) return;
  if (favs.find(f => f.s === item.s)) { showToast('已在收藏中'); return; }
  favs.unshift({ s: item.s, n: item.n || '' });
  save();
  showToast('⭐ 已加入收藏：' + item.s);
}

function delFav(i) { favs.splice(i, 1); save(); render(); }

function addToPool(s, n) {
  const idx = POOL.length;
  POOL.push({ s, n: n || '' });
  return idx;
}

function mkCell(s, n, delIdx) {
  const idx = addToPool(s, n);
  const dbl = delIdx == null ? ` ondblclick="addFavByIdx(${idx})"` : '';
  const del = delIdx != null ? `<button class="del-btn" onclick="event.stopPropagation();delFav(${delIdx})">×</button>` : '';
  const tip = n ? ` title="${n.replace(/"/g, '&quot;')}"` : '';
  return `<div class="cell" data-idx="${idx}" onclick="copyByIdx(${idx})"${dbl}${tip}><div class="cell-s">${s}</div><div class="cell-n">${n || ''}</div>${del}</div>`;
}

function mkKaoCell(s, n, delIdx) {
  const idx = addToPool(s, n);
  const dbl = delIdx == null ? ` ondblclick="addFavByIdx(${idx})"` : '';
  const del = delIdx != null ? `<button class="del-btn" onclick="event.stopPropagation();delFav(${delIdx})">×</button>` : '';
  const tip = n ? ` title="${n.replace(/"/g, '&quot;')}"` : '';
  return `<div class="kao-cell" data-idx="${idx}" onclick="copyByIdx(${idx})"${dbl}${tip}><div class="kao-s">${s}</div><div class="kao-n">${n || ''}</div>${del}</div>`;
}

// Kaomoji: strings over 4 chars or containing full-width chars
function isKao(s) {
  if (s.length > 4) return true;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    if (c >= 0xFF01 && c <= 0xFF60) return true; // full-width
    if (c >= 0x3000 && c <= 0x303F) return true; // CJK punctuation
  }
  return false;
}

function renderItems(items, favMode) {
  const syms = items.filter(it => !isKao(it.s));
  const kaos = items.filter(it => isKao(it.s));
  let html = '';
  if (syms.length) {
    html += '<div class="grid">';
    syms.forEach((it, i) => { html += mkCell(it.s, it.n || '', favMode ? items.indexOf(it) : null); });
    html += '</div>';
  }
  if (kaos.length) {
    html += `<div class="kao-grid" style="margin-top:${syms.length ? '8px' : '0'}">`;
    kaos.forEach(it => { html += mkKaoCell(it.s, it.n || '', favMode ? items.indexOf(it) : null); });
    html += '</div>';
  }
  return html;
}

function render() {
  POOL = []; // reset pool on each render
  const ttl = document.getElementById('pg-ttl');
  const desc = document.getElementById('pg-desc');
  const cont = document.getElementById('content');

  // Search
  if (q.trim()) {
    const ql = q.toLowerCase().trim();
    const seen = new Set();
    const res = [];
    const add = item => { if (!seen.has(item.s)) { seen.add(item.s); res.push(item); } };

    // 1. 別名命中（最高優先）
    Object.entries(ALIAS).forEach(([kw, syms]) => {
      if (kw.toLowerCase().includes(ql) || ql.includes(kw.toLowerCase())) {
        syms.forEach(s => add({ s, n: SYM_NAMES[s] || kw }));
      }
    });

    // 2. SYM 特殊符號：符號本身 or 名稱命中
    Object.values(SYM).forEach(cat => cat.groups.forEach(g => g.items.forEach(s => {
      const name = SYM_NAMES[s] || '';
      if (s.includes(q) || name.toLowerCase().includes(ql)) add({ s, n: name });
    })));

    // 3. Emoji：符號本身 or 中文名稱
    Object.values(EMJ).forEach(cat => {
      const items = cat.groups
        ? cat.groups.flatMap(g => g.items)
        : cat.items;
      items.forEach(it => {
        if (it.s.includes(q) || (it.n && it.n.toLowerCase().includes(ql))) add(it);
      });
    });

    // 4. 顏文字
    KAO.forEach(g => g.items.forEach(it => {
      if (it.s.includes(q) || (it.n && it.n.toLowerCase().includes(ql))) add(it);
    }));

    // 5. 收藏
    favs.forEach(it => {
      if (it.s.includes(q) || (it.n && it.n.toLowerCase().includes(ql))) add(it);
    });
    ttl.textContent = '搜尋：' + q;
    desc.textContent = '找到 ' + res.length + ' 個結果';
    cont.innerHTML = res.length ? renderItems(res) : '<div class="empty"><div class="empty-ic">🔍</div>沒有找到符合的符號</div>';
    return;
  }

  // Fav
  if (tab === 'fav') {
    ttl.textContent = '我的收藏';
    desc.textContent = '雙擊任何符號可加入 · 點擊複製';
    let html = '<div class="fav-add"><div class="fav-add-ttl">手動加入任何符號或顏文字</div>';
    html += '<div class="fav-row"><input class="fav-inp" id="ni" type="text" placeholder="輸入符號、emoji 或顏文字…">';
    html += '<input class="fav-inp nm" id="nn" type="text" placeholder="名稱（選填）">';
    html += '<button class="btn-add" onclick="doAdd()">+ 加入</button></div></div>';
    if (favs.length) {
      html += '<div class="sg-ttl" style="margin-bottom:6px">已收藏（' + favs.length + '）</div>';
      html += renderItems(favs, true);
    } else {
      html += '<div class="empty"><div class="empty-ic">⭐</div>還沒有收藏<br>在其他分類雙擊符號即可加入</div>';
    }
    cont.innerHTML = html;
    return;
  }

  // Kaomoji
  if (tab === 'kaomoji') {
    ttl.textContent = '顏文字';
    desc.textContent = '點擊複製 · 雙擊加收藏';
    let html = '';
    KAO.forEach(g => {
      html += '<div class="sg"><div class="sg-ttl">' + g.label + '</div><div class="kao-grid">';
      g.items.forEach(it => { html += mkKaoCell(it.s, it.n); });
      html += '</div></div>';
    });
    cont.innerHTML = html;
    return;
  }

  // Emoji
  if (tab.startsWith('emoji_')) {
    const cid = tab.slice(6);
    const cat = EMJ[cid]; if (!cat) return;
    ttl.textContent = cat.label;
    if (cat.groups) {
      const total = cat.groups.reduce((a, g) => a + g.items.length, 0);
      desc.textContent = '共 ' + total + ' 個 · 點擊複製 · 雙擊加收藏';
      let html = '';
      cat.groups.forEach(g => {
        html += '<div class="sg"><div class="sg-ttl">' + g.label + '</div><div class="grid">';
        g.items.forEach(it => { html += mkCell(it.s, it.n || ''); });
        html += '</div></div>';
      });
      cont.innerHTML = html;
    } else {
      desc.textContent = '共 ' + cat.items.length + ' 個 · 點擊複製 · 雙擊加收藏';
      let html = '<div class="grid">';
      cat.items.forEach(it => { html += mkCell(it.s, it.n || ''); });
      html += '</div>';
      cont.innerHTML = html;
    }
    return;
  }

  // Special symbols
  if (tab.startsWith('sym_')) {
    const key = tab.slice(4);
    const cat = SYM[key]; if (!cat) return;
    const total = cat.groups.reduce((a, g) => a + g.items.length, 0);
    ttl.textContent = cat.label;
    desc.textContent = '共 ' + total + ' 個符號 · 點擊複製 · 雙擊加收藏';
    let html = '';
    cat.groups.forEach(g => {
      html += '<div class="sg"><div class="sg-ttl">' + g.label + '</div><div class="grid">';
      g.items.forEach(s => { html += mkCell(s, ''); });
      html += '</div></div>';
    });
    cont.innerHTML = html;
  }
}

function doAdd() {
  const s = document.getElementById('ni').value.trim();
  const n = document.getElementById('nn').value.trim();
  if (!s) return;
  if (favs.find(f => f.s === s)) { showToast('已在收藏中'); return; }
  favs.unshift({ s, n: n || s }); save();
  showToast('⭐ 已加入收藏：' + s);
  document.getElementById('ni').value = '';
  document.getElementById('nn').value = '';
  render();
}

document.querySelectorAll('.nav').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav').forEach(x => x.classList.remove('on'));
    el.classList.add('on');
    tab = el.dataset.tab;
    document.getElementById('search').value = ''; q = '';
    render();
    document.getElementById('main').scrollTop = 0;
  });
});

document.getElementById('search').addEventListener('input', e => { q = e.target.value; render(); });

save();
render();
</script>
